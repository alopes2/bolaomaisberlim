name: Infrastructure

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: infrastructure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-central-1
      TF_IN_AUTOMATION: 'true'
      TF_VAR_api_football_key: ${{ secrets.API_FOOTBALL_KEY }}
      TF_VAR_ses_identity_arn: ${{ vars.SES_IDENTITY_ARN }}
      TF_VAR_ses_from_email: ${{ vars.SES_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform fmt -check -recursive infra
      - run: terraform -chdir=infra init -input=false
      - run: terraform -chdir=infra validate
      - name: Create private plan artifact
        run: terraform -chdir=infra plan -input=false -out=tfplan > /dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan
          retention-days: 5
          if-no-files-found: error

  apply:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: eu-central-1
      TF_IN_AUTOMATION: 'true'
      TF_VAR_api_football_key: ${{ secrets.API_FOOTBALL_KEY }}
      TF_VAR_ses_identity_arn: ${{ vars.SES_IDENTITY_ARN }}
      TF_VAR_ses_from_email: ${{ vars.SES_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform fmt -check -recursive infra
      - run: terraform -chdir=infra init -input=false
      - run: terraform -chdir=infra validate
      - name: Recreate reviewed plan
        run: terraform -chdir=infra plan -input=false -out=tfplan > /dev/null
      - name: Apply through protected environment
        run: terraform -chdir=infra apply -input=false -auto-approve tfplan > /dev/null
