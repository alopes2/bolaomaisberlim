name: Infrastructure

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: infrastructure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-central-1
      TF_IN_AUTOMATION: 'true'
      TF_VAR_admin_emails: ${{ vars.ADMIN_EMAILS }}
      TF_VAR_cognito_domain_prefix: ${{ vars.COGNITO_DOMAIN_PREFIX }}
      TF_VAR_cognito_callback_urls: ${{ vars.COGNITO_CALLBACK_URLS }}
      TF_VAR_cognito_logout_urls: ${{ vars.COGNITO_LOGOUT_URLS }}
      TF_VAR_google_client_id: ${{ vars.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_ses_identity_arn: ${{ vars.SES_IDENTITY_ARN }}
      TF_VAR_ses_from_email: ${{ vars.SES_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform fmt -check -recursive infra
      - run: terraform -chdir=infra init -input=false
      - run: terraform -chdir=infra validate
      - name: Create private plan artifact
        run: terraform -chdir=infra plan -input=false -out=tfplan > /dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan
          retention-days: 5
          if-no-files-found: error

  apply:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: eu-central-1
      TF_IN_AUTOMATION: 'true'
      TF_VAR_admin_emails: ${{ vars.ADMIN_EMAILS }}
      TF_VAR_cognito_domain_prefix: ${{ vars.COGNITO_DOMAIN_PREFIX }}
      TF_VAR_cognito_callback_urls: ${{ vars.COGNITO_CALLBACK_URLS }}
      TF_VAR_cognito_logout_urls: ${{ vars.COGNITO_LOGOUT_URLS }}
      TF_VAR_google_client_id: ${{ vars.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_ses_identity_arn: ${{ vars.SES_IDENTITY_ARN }}
      TF_VAR_ses_from_email: ${{ vars.SES_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform fmt -check -recursive infra
      - run: terraform -chdir=infra init -input=false
      - run: terraform -chdir=infra validate
      - name: Recreate reviewed plan
        run: terraform -chdir=infra plan -input=false -out=tfplan
      - name: Apply through protected environment
        run: terraform -chdir=infra apply -input=false -auto-approve tfplan
      - name: Remove obsolete match schedules
        shell: bash
        run: |
          set -euo pipefail
          group_name="$(terraform -chdir=infra output -raw scheduler_schedule_group_name)"
          schedule_names="$(
            aws scheduler list-schedules \
              --group-name "$group_name" \
              --output json |
              jq -r '.Schedules[] | select(.Name | startswith("match-")) | .Name'
          )"
          while IFS= read -r schedule_name; do
            test -n "$schedule_name" || continue
            aws scheduler delete-schedule \
              --group-name "$group_name" \
              --name "$schedule_name"
          done <<< "$schedule_names"
